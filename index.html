<!DOCTYPE html>
<html>
<head>
  <title>Habit Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system;
      background: #0f172a;
      color: white;
      padding: 15px;
    }

    h2 { text-align: center; }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px 0;
    }

    .habit {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .btns button {
      margin: 3px;
    }

    .done { background: #22c55e; }
    .miss { background: #ef4444; }
    .skip { background: #f59e0b; }

    .hidden { display: none; }
  </style>
</head>

<body>

<h2 id="dateTitle"></h2>

<input id="habitInput" placeholder="Add habit">
<button onclick="addHabit()">Add</button>
<button onclick="toggleView()">📅 Monthly View</button>

<div id="dailyView"></div>
<div id="monthlyView" class="hidden"></div>

<script>
let habits = JSON.parse(localStorage.getItem("habits")) || [];

// Get current day (1–30)
let today = new Date().getDate();
if (today > 30) today = 30;

document.getElementById("dateTitle").innerText = "Day " + today;

// Save data
function save() {
  localStorage.setItem("habits", JSON.stringify(habits));
}

// Add habit
function addHabit() {
  const input = document.getElementById("habitInput");
  if (!input.value) return;

  habits.push({
    name: input.value,
    days: Array(30).fill("miss") // default = ❌
  });

  input.value = "";
  save();
  render();
}

// Set status
function setStatus(hIndex, status) {
  habits[hIndex].days[today - 1] = status;
  save();
  render();
}

// DAILY VIEW
function renderDaily() {
  const container = document.getElementById("dailyView");
  container.innerHTML = "";

  habits.forEach((habit, index) => {
    let status = habit.days[today - 1];

    container.innerHTML += `
      <div class="habit">
        <b>${habit.name}</b>
        <div class="btns">
          <button onclick="setStatus(${index}, 'done')" class="done">✓</button>
          <button onclick="setStatus(${index}, 'miss')" class="miss">✗</button>
          <button onclick="setStatus(${index}, 'skip')" class="skip">O</button>
        </div>
        <div>Status: ${status}</div>
      </div>
    `;
  });
}

// MONTHLY VIEW
function renderMonthly() {
  const container = document.getElementById("monthlyView");
  container.innerHTML = "";

  habits.forEach(habit => {
    let html = `<div class="habit"><b>${habit.name}</b><br>`;

    habit.days.forEach((d, i) => {
      let symbol = d === "done" ? "✓" : d === "skip" ? "O" : "✗";
      html += `${symbol} `;
      if ((i+1) % 10 === 0) html += "<br>";
    });

    html += "</div>";
    container.innerHTML += html;
  });
}

// Toggle view
function toggleView() {
  document.getElementById("dailyView").classList.toggle("hidden");
  document.getElementById("monthlyView").classList.toggle("hidden");
}

// Render all
function render() {
  renderDaily();
  renderMonthly();
}

render();
</script>

</body>
</html>
