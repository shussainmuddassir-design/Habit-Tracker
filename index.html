<!DOCTYPE html>
<html>
<head>
  <title>Habit Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system;
      background: #0f172a;
      color: white;
      padding: 15px;
    }

    h2 { text-align: center; }

    input, button, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px 0;
    }

    .habit {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .completed { opacity: 0.4; }

    .monthly-table {
      margin-top: 20px;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      font-size: 12px;
      min-width: 800px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 6px;
      text-align: center;
    }

    /* Freeze first column */
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      background: #1e293b;
      z-index: 2;
    }

    .done { background: #22c55e; }
    .miss { background: #ef4444; }

    .hidden { display: none; }

  </style>
</head>

<body>

<h2 id="dateTitle"></h2>

<input id="habitInput" placeholder="Add habit">
<button onclick="addHabit()">Add</button>
<button onclick="toggleView()">📅 Monthly View</button>

<br>

<select id="monthSelect" onchange="changeMonth()"></select>

<div id="dailyView"></div>
<div id="monthlyView" class="hidden"></div>

<script>
let data = JSON.parse(localStorage.getItem("habitData")) || {};
let habits = JSON.parse(localStorage.getItem("habits")) || [];

let today = new Date();
let currentMonth = today.getMonth(); // 0-11
let currentYear = today.getFullYear();
let day = today.getDate();

document.getElementById("dateTitle").innerText =
  today.toDateString();

// Month names
const months = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

// Populate dropdown
let select = document.getElementById("monthSelect");
months.forEach((m, i) => {
  select.innerHTML += `<option value="${i}">${m}</option>`;
});
select.value = currentMonth;

// Save
function save() {
  localStorage.setItem("habitData", JSON.stringify(data));
  localStorage.setItem("habits", JSON.stringify(habits));
}

// Initialize month data
function initMonth(monthKey) {
  if (!data[monthKey]) {
    data[monthKey] = habits.map(() => Array(31).fill("miss"));
  }
}

// Add habit
function addHabit() {
  const input = document.getElementById("habitInput");
  if (!input.value) return;

  habits.push(input.value);

  Object.keys(data).forEach(month => {
    data[month].push(Array(31).fill("miss"));
  });

  input.value = "";
  save();
  render();
}

// Toggle habit
function toggleHabit(index) {
  let key = currentYear + "-" + currentMonth;
  initMonth(key);

  let status = data[key][index][day - 1];
  data[key][index][day - 1] = status === "done" ? "miss" : "done";

  save();
  render();
}

// DAILY VIEW
function renderDaily() {
  let key = currentYear + "-" + currentMonth;
  initMonth(key);

  const container = document.getElementById("dailyView");
  container.innerHTML = "";

  habits.forEach((habit, i) => {
    let done = data[key][i][day - 1] === "done";

    container.innerHTML += `
      <div class="habit ${done ? "completed" : ""}">
        <span>${habit}</span>
        <input type="checkbox" ${done ? "checked" : ""}
          onchange="toggleHabit(${i})">
      </div>
    `;
  });
}

// MONTHLY VIEW
function renderMonthly() {
  let key = currentYear + "-" + currentMonth;
  initMonth(key);

  const container = document.getElementById("monthlyView");

  let html = `<div class="monthly-table"><table><tr><th>Habit</th>`;

  for (let i = 1; i <= 31; i++) {
    html += `<th>${i}</th>`;
  }
  html += `</tr>`;

  habits.forEach((habit, i) => {
    html += `<tr><td>${habit}</td>`;

    data[key][i].forEach(d => {
      html += `<td class="${d === "done" ? "done" : "miss"}"></td>`;
    });

    html += `</tr>`;
  });

  html += `</table></div>`;
  container.innerHTML = html;
}

// Toggle view
function toggleView() {
  document.getElementById("dailyView").classList.toggle("hidden");
  document.getElementById("monthlyView").classList.toggle("hidden");
}

// Change month
function changeMonth() {
  currentMonth = parseInt(document.getElementById("monthSelect").value);
  render();
}

function render() {
  renderDaily();
  renderMonthly();
}

render();
</script>

</body>
</html>
