<!DOCTYPE html>
<html>
<head>
  <title>Habit Tracker Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 15px;
    }

    h2 { text-align: center; }

    input, button, select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin: 5px 0;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .habit {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      padding: 14px;
      border-radius: 14px;
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .completed { opacity: 0.4; }

    .progress {
      height: 6px;
      background: #334155;
      border-radius: 5px;
      margin-top: 5px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: #22c55e;
    }

    table {
      border-collapse: collapse;
      font-size: 12px;
      min-width: 900px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 6px;
      text-align: center;
    }

    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      background: #1e293b;
      z-index: 2;
    }

    .done { background: #22c55e; }
    .miss { background: #ef4444; }

    .today {
      border: 2px solid #38bdf8;
    }

    .hidden { display: none; }

    .top-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
  </style>
</head>
  
<body>
  
<div class="top-bar">
  <h3 id="dateTitle"></h3>
  <div>
    <span onclick="toggleMenu()">⚙️</span>
    <div id="menu" style="display:none;">
      <button onclick="clearData()">Reset</button>
    </div>
  </div>
</div>
  <input id="habitInput" placeholder="Add habit">
  <button onclick="addHabit()">Add</button>
  <button onclick="toggleView()">📅 Monthly</button>
  <button onclick="clearData()">🧹 Reset</button>
</div>

<select id="monthSelect" onchange="changeMonth()"></select>

<div id="dailyView"></div>
<div id="monthlyView" class="hidden"></div>

<script>
let data = JSON.parse(localStorage.getItem("habitData")) || {};
let habits = JSON.parse(localStorage.getItem("habits")) || [];
  habits = habits.map(h => typeof h === "object" ? h.name : h);

// 🧠 FIX: Clean old object-based data automatically
habits = habits.map(h => typeof h === "object" ? h.name : h);

let todayDate = new Date();
let currentMonth = todayDate.getMonth();
let currentYear = todayDate.getFullYear();
let today = todayDate.getDate();

document.getElementById("dateTitle").innerText = todayDate.toDateString();

const months = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

let select = document.getElementById("monthSelect");
months.forEach((m, i) => {
  select.innerHTML += `<option value="${i}">${m}</option>`;
});
select.value = currentMonth;

function save() {
  localStorage.setItem("habitData", JSON.stringify(data));
  localStorage.setItem("habits", JSON.stringify(habits));
}

function clearData() {
  if (confirm("Reset all data?")) {
    localStorage.clear();
    location.reload();
  }
}

function toggleMenu(){
let m = document.getElementById("menu");
m.style.display = m.style.display === "block" ? "none" : "block";
}
  
function initMonth(key) {
  if (!data[key]) {
    data[key] = habits.map(() => Array(31).fill("miss"));
  }
}

function addHabit() {
  const input = document.getElementById("habitInput");
  if (!input.value) return;

  habits.push(input.value);

  Object.keys(data).forEach(m => {
    data[m].push(Array(31).fill("miss"));
  });

  input.value = "";
  save();
  render();
}

function toggleHabit(i) {
  let key = currentYear + "-" + currentMonth;
  initMonth(key);

  let val = data[key][i][today - 1];
  data[key][i][today - 1] = val === "done" ? "miss" : "done";

  save();
  render();
}

// DAILY VIEW
function renderDaily() {
  let key = currentYear + "-" + currentMonth;
  initMonth(key);

  let activeHTML = "";
let completedHTML = "";

habits.forEach((habit, index) => {
  let isDone = data[key][index][today - 1] === "done";

  let row = `
    <div class="habit ${isDone ? "completed" : ""}">
      <span contenteditable="true" 
        onblur="editHabit(${index}, this.innerText)">
        ${habit}
      </span>
      <input type="checkbox" ${isDone ? "checked" : ""} 
        onchange="toggleHabit(${index})">
    </div>
  `;

  if(isDone) completedHTML += row;
  else activeHTML += row;
});

document.getElementById("dailyView").innerHTML = activeHTML;
document.getElementById("completedSection").innerHTML = completedHTML;
}
function editHabit(i, val){
  habits[i] = val;
  save();
}
  <div>
  <h3 onclick="toggleCompleted()">Completed ▼</h3>
  <div id="completedSection" style="display:none;"></div>
</div>
function toggleCompleted(){
  let el = document.getElementById("completedSection");
  el.style.display = el.style.display === "none" ? "block" : "none";
}
  
// MONTHLY VIEW
function renderMonthly() {
  let key = currentYear + "-" + currentMonth;
  initMonth(key);

  let container = document.getElementById("monthlyView");

  let html = `<table><tr><th>Habit</th>`;

  for (let i = 1; i <= 31; i++) {
    html += `<th class="${i === today ? "today" : ""}">${i}</th>`;
  }

  html += `</tr><tr><th></th>`;

  // Weekday row
  let days = ["S","M","T","W","T","F","S"];
  for (let i = 1; i <= 31; i++) {
    let d = new Date(currentYear, currentMonth, i).getDay();
    html += `<th>${days[d]}</th>`;
  }

  html += `</tr>`;

  habits.forEach((habit, i) => {
    html += `<tr><td>${habit}</td>`;

    data[key][i].forEach((d, index) => {
      html += `<td class="${d === "done" ? "done" : "miss"} ${index+1===today?"today":""}"></td>`;
    });

    html += `</tr>`;
  });

  html += `</table>`;
  container.innerHTML = html;
}

function toggleView() {
  document.getElementById("dailyView").classList.toggle("hidden");
  document.getElementById("monthlyView").classList.toggle("hidden");
}

function changeMonth() {
  currentMonth = parseInt(document.getElementById("monthSelect").value);
  render();
}

function render() {
  renderDaily();
  renderMonthly();
}
<div class="bottom-nav">
  <div onclick="switchTab('daily')">Daily</div>
  <div onclick="switchTab('monthly')">Monthly</div>
</div>
  function switchTab(tab){
  if(tab === "daily"){
    dailyView.style.display = "block";
    monthlyView.style.display = "none";
  } else {
    dailyView.style.display = "none";
    monthlyView.style.display = "block";
  }
}
render();
</script>

</body>
  
</html>
