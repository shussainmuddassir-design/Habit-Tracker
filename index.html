<!DOCTYPE html>
<html>
<head>
  <title>Habit Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system;
      background: #0f172a;
      color: white;
      padding: 15px;
    }

    h2 { text-align: center; }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px 0;
    }

    .habit {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .completed {
      opacity: 0.4;
    }

    .monthly-table {
      margin-top: 20px;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 6px;
      text-align: center;
    }

    .done {
      background: #22c55e;
    }

    .miss {
      background: #ef4444;
    }

    .hidden {
      display: none;
    }

  </style>
</head>

<body>

<h2 id="dateTitle"></h2>

<input id="habitInput" placeholder="Add habit">
<button onclick="addHabit()">Add</button>
<button onclick="toggleView()">📅 Monthly View</button>

<div id="dailyView"></div>
<div id="monthlyView" class="hidden"></div>

<script>
let habits = JSON.parse(localStorage.getItem("habits")) || [];

let today = new Date().getDate();
if (today > 30) today = 30;

document.getElementById("dateTitle").innerText = "Day " + today;

function save() {
  localStorage.setItem("habits", JSON.stringify(habits));
}

function addHabit() {
  const input = document.getElementById("habitInput");
  if (!input.value) return;

  habits.push({
    name: input.value,
    days: Array(30).fill("miss")
  });

  input.value = "";
  save();
  render();
}

function toggleHabit(index) {
  let current = habits[index].days[today - 1];
  habits[index].days[today - 1] = current === "done" ? "miss" : "done";
  save();
  render();
}

// DAILY VIEW
function renderDaily() {
  const container = document.getElementById("dailyView");
  container.innerHTML = "";

  habits.forEach((habit, index) => {
    let isDone = habit.days[today - 1] === "done";

    container.innerHTML += `
      <div class="habit ${isDone ? "completed" : ""}">
        <span>${habit.name}</span>
        <input type="checkbox" ${isDone ? "checked" : ""} 
          onchange="toggleHabit(${index})">
      </div>
    `;
  });
}

// MONTHLY VIEW (Excel style)
function renderMonthly() {
  const container = document.getElementById("monthlyView");

  let html = `<div class="monthly-table"><table><tr><th>Habit</th>`;

  // Header days
  for (let i = 1; i <= 30; i++) {
    html += `<th>${i}</th>`;
  }
  html += `</tr>`;

  // Rows
  habits.forEach(habit => {
    html += `<tr><td>${habit.name}</td>`;

    habit.days.forEach(d => {
      let cls = d === "done" ? "done" : "miss";
      html += `<td class="${cls}"></td>`;
    });

    html += `</tr>`;
  });

  html += `</table></div>`;
  container.innerHTML = html;
}

// Toggle view
function toggleView() {
  document.getElementById("dailyView").classList.toggle("hidden");
  document.getElementById("monthlyView").classList.toggle("hidden");
}

function render() {
  renderDaily();
  renderMonthly();
}

render();
</script>

</body>
</html>
