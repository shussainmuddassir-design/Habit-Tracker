<!DOCTYPE html>
<html>
<head>
  <title>My Habit Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    h2 { text-align: center; }
    input, button {
      padding: 10px;
      width: 100%;
      margin: 5px 0;
    }
    li {
      background: white;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>My Habit Tracker</h2>

<input type="text" id="habitInput" placeholder="Enter habit">
<button onclick="addHabit()">Add Habit</button>

<ul id="habitList"></ul>

<script>
  let habits = JSON.parse(localStorage.getItem("habits")) || [];

  function renderHabits() {
    const list = document.getElementById("habitList");
    list.innerHTML = "";

    habits.forEach((habit, index) => {
      list.innerHTML += `
        <li>
          <b>${habit.name}</b><br>
          Done: <input type="checkbox" ${habit.done ? "checked" : ""} onchange="toggleHabit(${index})">
        </li>`;
    });
  }

  function addHabit() {
    const input = document.getElementById("habitInput");
    habits.push({ name: input.value, done: false });
    input.value = "";
    localStorage.setItem("habits", JSON.stringify(habits));
    renderHabits();
  }

  function toggleHabit(index) {
    habits[index].done = !habits[index].done;
    localStorage.setItem("habits", JSON.stringify(habits));
    renderHabits();
  }

  renderHabits();
</script>

</body>
</html>
