<!DOCTYPE html>
<html>
<head>
  <title>Habit Tracker Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system;
      background: #0f172a;
      color: white;
      padding: 10px;
      margin: 0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings {
      cursor: pointer;
      font-size: 20px;
    }

.menu {
  position: fixed;
  right: 0;
  top: 0;
  width: 80%;
  max-width: 300px;
  height: 100vh;
  background: #1e293b;
  padding: 20px;
  box-shadow: -2px 0 10px rgba(0,0,0,0.5);
  transform: translateX(100%);
  transition: transform 0.3s ease-in-out;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.menu.open {
  transform: translateX(0);
}

.menu-header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: bold;
}

.menu-close {
  cursor: pointer;
  font-size: 24px;
  background: none;
  border: none;
  color: white;
  padding: 0;
}
    
    input, button, select {
      padding: 8px;
      border-radius: 8px;
      border: none;
      margin: 5px 0;
    }

    button {
      background: #22c55e;
      color: white;
    }

    .habit {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .completed { opacity: 0.4; }

    .section { margin-top: 15px; }

    .section h3 { cursor: pointer; }

    .hidden { display: none; }

   table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  table-layout: auto;
}

th, td {
  border: 1px solid #334155;
  padding: 8px 6px;
  text-align: center;
  height: auto;
  width: auto;
  min-width: auto;
}

th:first-child, td:first-child {
  position: sticky;
  left: 0;
  background: #1e293b;
  width: auto;
  min-width: auto;
  padding: 8px 10px;
  text-align: left;
  white-space: normal;
  overflow: visible;
  word-break: break-word;
}

    .done { background: #22c55e; }
    .miss { background: #ef4444; }
    .future { background: #ffffff; color: black; }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #1e293b;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
    }

    .active-tab { background: #22c55e; }

    #monthContainer { margin-top: 10px; }
  </style>
</head>

<body>

<div class="top-bar">
  <h3 id="dateTitle"></h3>
  <div>
  <span class="settings" onclick="toggleMenu()">⚙️</span>
</div>
<div class="menu" id="menu">
  <div class="menu-header">
    <button class="menu-close" onclick="toggleMenu()"><</button>
    <span>Settings</span>
  </div>
  <button onclick="clearData()" style="width: 100%;">Reset</button>
</div>
</div>

<input id="habitInput" placeholder="Add habit">
<button onclick="addHabit()">Add</button>

<div id="dailyView"></div>

<div class="section">
  <h3 id="completedHeader" onclick="toggleCompleted()">Completed ▶</h3>
  <div id="completedSection" class="hidden"></div>
</div>

<div id="monthContainer" class="hidden">
  <select id="monthSelect" onchange="changeMonth()"></select>
</div>

<div id="monthlyView" class="hidden"></div>

<div class="bottom-nav">
  <div class="tab active-tab" onclick="switchTab('daily')">Daily</div>
  <div class="tab" onclick="switchTab('monthly')">Monthly</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("habitData")) || {};
let habits = JSON.parse(localStorage.getItem("habits")) || [];

// Fix old object data
habits = habits.map(h => typeof h === "object" ? h.name : h);

let todayDate = new Date();
let currentMonth = todayDate.getMonth();
let currentYear = todayDate.getFullYear();
let today = todayDate.getDate();

document.getElementById("dateTitle").innerText = todayDate.toDateString();

const months = ["January","February","March","April","May","June",
"July","August","September","October","November","December"];

let select = document.getElementById("monthSelect");
months.forEach((m,i)=> select.innerHTML += `<option value="${i}">${m}</option>`);
select.value = currentMonth;

function save(){
  localStorage.setItem("habitData", JSON.stringify(data));
  localStorage.setItem("habits", JSON.stringify(habits));
}

function clearData(){
  if(confirm("Reset all data?")){
    localStorage.clear();
    location.reload();
  }
}

function toggleMenu(){
  let m = document.getElementById("menu");
  m.classList.toggle("open");
}

function initMonth(key){
  if(!data[key]){
    data[key] = habits.map(()=> Array(31).fill(""));
  }
}

function addHabit(){
  let input = document.getElementById("habitInput");
  if(!input.value.trim()) return;

  habits.push(input.value);
  Object.keys(data).forEach(m=> data[m].push(Array(31).fill("")));
  input.value="";
  save(); render();
}

function toggleHabit(i){
  let key = currentYear+"-"+currentMonth;
  initMonth(key);

  let val = data[key][i][today-1];
  data[key][i][today-1] = val==="done" ? "" : "done";

  save(); render();
}

function editHabit(i,val){
  habits[i]=val.trim();
  save();
  render();
}

function renderDaily(){
  let key = currentYear+"-"+currentMonth;
  initMonth(key);

  let activeHTML="";
  let completedHTML="";

  habits.forEach((h,i)=>{
    let done = data[key][i][today-1]==="done";

    let row = `
      <div class="habit ${done?"completed":""}">
        <span contenteditable="true" 
          onblur="editHabit(${i}, this.innerText)">
          ${h}
        </span>
        <input type="checkbox" ${done?"checked":""}
          onchange="toggleHabit(${i})">
      </div>`;

    if(done) completedHTML += row;
    else activeHTML += row;
  });

  document.getElementById("dailyView").innerHTML = activeHTML;
  document.getElementById("completedSection").innerHTML = completedHTML;
}

function toggleCompleted(){
  let el = document.getElementById("completedSection");
  let header = document.getElementById("completedHeader");

  el.classList.toggle("hidden");

  header.innerText = el.classList.contains("hidden") 
    ? "Completed ▶" 
    : "Completed ▼";
}

function renderMonthly(){
  let key = currentYear+"-"+currentMonth;
  initMonth(key);

  let now = new Date();
  let isCurrentMonth = (currentMonth === now.getMonth() && currentYear === now.getFullYear());

  // Calculate maximum habit name length to adjust first column
let maxLength = Math.max(...habits.map(h => h.length), 7); // minimum 7 for "Habit"
let habitColWidth = Math.min(200, 80 + (maxLength * 8));

let html=`<table style="width: auto;"><tr><th style="width: ${habitColWidth}px; min-width: ${habitColWidth}px; vertical-align: middle;" rowspan="2">Habit</th>`;

// First row - Days of week
let days=["S","M","T","W","T","F","S"];
for(let i=1;i<=31;i++){
  let d=new Date(currentYear,currentMonth,i).getDay();
  html+=`<th>${days[d]}</th>`;
}

html+="</tr><tr>";

// Second row - Dates (1-31)
for(let i=1;i<=31;i++){
  html+=`<th>${i}</th>`;
}

html+="</tr>";

  habits.forEach((h,i)=>{
    html+=`<tr><td>${h}</td>`;

    data[key][i].forEach((d,idx)=>{
      let cls="";

      if (isCurrentMonth) {
        if(idx+1 < now.getDate()) cls = d==="done"?"done":"miss";
        else if(idx+1 === now.getDate()) cls = d==="done"?"done":"";
        else cls="future";
      } else {
        cls = d==="done" ? "done" : (d ? "miss" : "");
      }

      html+=`<td class="${cls}"></td>`;
    });

    html+="</tr>";
  });

  html+="</table>";
  document.getElementById("monthlyView").innerHTML=html;
}

function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active-tab"));
    if(tab==="daily"){
    dailyView.classList.remove("hidden");
    monthlyView.classList.add("hidden");
    monthContainer.classList.add("hidden");
   document.getElementById("completedSection").classList.add("hidden");
    document.querySelectorAll(".tab")[0].classList.add("active-tab");
  } else {
    dailyView.classList.add("hidden");
    monthlyView.classList.remove("hidden");
    monthContainer.classList.remove("hidden");
    document.getElementById("completedSection").classList.add("hidden");
    document.getElementById("completedHeader").innerText = "Completed ▶";
    document.querySelectorAll(".tab")[1].classList.add("active-tab");
  }
}
     
function changeMonth(){
  currentMonth=parseInt(document.getElementById("monthSelect").value);
  render();
}

function render(){
  renderDaily();
  renderMonthly();
}

render();
</script>

</body>
</html>
